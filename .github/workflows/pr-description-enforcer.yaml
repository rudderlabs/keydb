name: 'Pull Request Description'
on:
  pull_request:
    types: 
      - opened
      - edited
      - reopened

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create release commits and tags
          permission-pull-requests: write # to create release PRs

      - uses: rudderlabs/pr-description-enforcer@1354172a4395fcfaa645b59cf8ef3cefa19e4f6d # v1.1.0
        with:
          repo-token: '${{ steps.generate-token.outputs.token }}'
          placeholder-regex: '< Replace .* >'
